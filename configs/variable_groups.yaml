# Pre-specified feature group membership for group-level SHAP attribution.
# Group membership is fixed before any attribution analysis is run.
# Column names must match FEATURE_COLS in src/amoris_bioage/data/schema.py.

lipid:
  - cholesterol
  - triglycerides
  - hdl
  - ldl

inflammation:
  - crp
  - wbc
  - albumin

renal:
  - creatinine
  - uric_acid

hepatic:
  - alp
  - ggt
  - alt

glycemic:
  - glucose

hematologic:
  - hemoglobin
  - iron
