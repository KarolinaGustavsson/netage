name: netage
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # PyTorch (MPS-accelerated on Apple Silicon; CPU fallback on other platforms)
  - pytorch::pytorch>=2.2
  - pytorch::torchvision
  - pytorch::torchaudio
  - pytorch::cpuonly  # remove this line and add cudatoolkit if using NVIDIA GPU

  # Scientific stack
  - conda-forge::numpy>=1.26
  - conda-forge::scipy>=1.12
  - conda-forge::pandas>=2.1
  - conda-forge::scikit-learn>=1.4

  # Survival analysis
  - conda-forge::lifelines>=0.29

  # YAML and config
  - conda-forge::pyyaml>=6.0

  # Dev tools
  - conda-forge::pytest>=8.0
  - conda-forge::pytest-cov>=4.1
  - conda-forge::black>=24.0
  - conda-forge::ruff>=0.3
  - conda-forge::ipykernel
  - conda-forge::jupyter

  # pip-only packages (not available on conda-forge or need latest)
  - pip:
    - scikit-survival>=0.22
    - shap>=0.45
    - captum>=0.7
    - pydantic>=2.6
    - -e .
